services:
  blog:
    build: ./blog
    ports:
      - "8000:80"
    volumes:
      - ./blog/src:/var/www/html
    networks:
      - ctf
    environment:
      env_file: .env

  db:
    image: mysql:8.0
    environment:
      env_file: .env
    volumes:
      - ./blog/db.sql:/tmp/db.sql
      - ./blog/init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
      - db_data:/var/lib/mysql
    networks:
      - ctf
    ports:
      - "3307:3306"

volumes:
  db_data:

networks:
  ctf:
    driver: bridge
